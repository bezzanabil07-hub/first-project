<!DOCTYPE html>
<html>
<head>
    <title>أول صفحة ويب</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            direction: rtl;
            text-align: right;
        }
        h1 {
            text-align: center;
        }
        img {
            display: block;
            margin: auto;
        }
    </style>
</head>
<body>
    <h1>اهلا بك في اول موقع لي</h1>
    <p>اسمي سام</p>
    <p>اتعلم HTML و CSS و JavaScript</p>
<p>هدفي ان اصبح مطور ويب</p>
<a href="https://www.google.com">اذهب الى قوقل</a>
<img src="car.jpg.webp" alt="صورة جميلة" width="600">
<form>
    <label for="name">الاسم:</label><br>
    <input type="text" placeholder="اكتب اسمك"><br><br>
    <label for="email">البريد الإلكتروني:</label><br>
    <input type="email" placeholder="example@email.com"><br><br>
    <label>كلمة المرور:</label><br>
    <input type="password"><br><br>
    <label for="phone">رقم الهاتف:</label><br>
    <input type="tel" id="phone" placeholder="اكتب رقم هاتفك"><br><br>
    <label for="birthdate">تاريخ الميلاد:</label><br>
    <input type="date" id="birthdate"><br><br>
    <label>الجنس:</label><br>
    <input type="radio" id="male" name="gender" value="male">
    <label for="male">ذكر</label>
    <input type="radio" id="female" name="gender" value="female">
    <label for="female">أنثى</label><br><br>
    <label for="country">اختر بلدك:</label><br>
    <select id="country">
    <option>الجزائر</option>
    <option>تونس</option>
    <option>المغرب</option>
    </select><br><br>
    <label for="agree">أوافق على الشروط والأحكام</label>
    <input type="checkbox" id="agree"><br><br>
    <button type="submit">إرسال</button>

</form>
</body>
</html>
