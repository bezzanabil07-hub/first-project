<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع وتين</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            margin: 20px 0;
        }
        h2 {
            color: #764ba2;
            margin: 20px 0 10px 0;
            font-size: 1.5em;
        }
        h3 {
            color: #667eea;
            margin: 15px 0 10px 0;
        }
        p {
            margin-bottom: 15px;
            color: #555;
        }
        ul {
            margin: 15px 20px;
            color: #555;
        }
        li {
            margin: 8px 0;
            list-style-position: inside;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>بزه نبيل</h1>
        <img src="https://via.placeholder.com/300x200?text=صورتي" alt="صورة شخصية">
        <h2>مهنتي: محاسب</h2>
        <p>أنا أتعلم تطوير الويب لأصبح مطور ويب محترف وأقوم بصناعة أول موقع لي.</p>
        
        <h3>مشاريعي القادمة:</h3>
        <ul>
            <li>مشروع الاستيراد</li>
            <li>فتح جمعية للاستيراد</li>
            <li>فتح موقع للشركة</li>
            <li>فتح موقع الجمعية</li>
            <li>أصبح مطور ويب وإضافة الذكاء الاصطناعي في المواقع وفي عملي</li>
        </ul>
    </div>
</body>
</html>
